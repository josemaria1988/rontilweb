<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/estilos.css" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-1BmE4kWBq78iYhFldvKuhfTAU6auU8tT94WrHftjDbrCEXSU1oBoqyl2QvZ6jIW3" crossorigin="anonymous">
    <title>Rontil S.A. Index</title>
</head>

<body>
    <header>
        <nav class="navegacion">
            <a href="#">
                <img class="logo" src="imagenes/logo.png" alt="logo">
            </a>

            <!--Menu Navegacion-->
            <ul class="enlaces-menu">
                <li><a href="#">Inicio</a></li>
                <li><a href="#">Nosotros</a></li>
                <li><a href="#">Productos</a></li>
                <li><a href="#">Contacto</a></li>
            </ul>
                            
            <button class="botonMenu" type="button">
                <span class="br-1"></span>
                <span class="br-2"></span>
                <span class="br-3"></span>
            </button>
        </nav>

        <div>
        <!--Dropdown para ingreso de Usuario-->
        <div class="btn btn-primary btn-lg">
            <button type="button" class="btn dropdown-toggle" id="dropdownMenuOffset"
                data-bs-toggle="dropdown" aria-expanded="false" data-bs-offset="10,20">
                Usuario
            </button>
            <form class="dropdown-menu p-3">
                <div class="mb-2">
                    <label for="exampleDropdownFormEmail2" class="form-label">E-mail</label>
                    <input type="email" class="form-control" id="exampleDropdownFormEmail2" id="user"
                        placeholder="email@example.com">
                </div>
                <div class="mb-2">
                    <label for="exampleDropdownFormPassword2" class="form-label">Contraseña</label>
                    <input type="password" class="form-control" id="exampleDropdownFormPassword2" id="pass"
                        placeholder="Password">
                </div>
                <div class="mb-2">
                    <div class="form-check">
                        <input type="checkbox" class="form-check-input" id="dropdownCheck2">
                        <label class="form-check-label" for="dropdownCheck2">
                            Recordarme
                        </label>
                    </div>
                </div>
                <button type="submit" class="btn btn-danger">Ingresar</button>
                <hr class="my-4">
                <label class="form-check-label">Eres nuevo?</label>
                <a class="btn btn-primary" href="paginas/registro.html" role="button">Registrarse</a>
            </form>

            <!--Carrito en Offcanvas-->
            <button class="btn btn-primary btn-lg" type="button" data-bs-toggle="offcanvas"
                data-bs-target="#offcanvas" aria-controls="offcanvas" id="boton-carrito">Carrito</button>

            <div class="offcanvas offcanvas-end" tabindex="-1" id="offcanvas" aria-labelledby="offcanvasLabel">
                <div class="offcanvas-header">
                    <h5 id="offcanvasLabel">Pendiente de Confirmación</h5>
                    <button type="button" class="btn-close text-reset" data-bs-dismiss="offcanvas"
                        aria-label="Close"></button>
                </div>
                <div class="offcanvas-body">
                        <h4 class="d-flex justify-content-between align-items-center mb-3">
                            <span class="text-primary">Carrito</span>
                            <span class="badge bg-primary rounded-pill" id="contador-total"></span>
                        </h4>
                        <ul class="list-group mb-2" id="carrito-compras">  
                                    <!--CONTENIDO GENERADO EN JAVASCRIPT-->
                        </ul>
                        <ul class="list-group mb-2">
                            <li class="list-group-item d-flex justify-content-between">
                                <span class="text-primary">Total ($)</span>                                     </span>
                                <strong id="precio-total"></strong>
                            </li>
                        </ul>

                    <form class="card p-2">
                        <div class="input-group">
                            <input type="text" class="form-control" placeholder="Código descuento">
                            <button type="submit" class="btn btn-secondary">Solicitar</button>
                        </div>
                        <button type="submit" class="btn btn-primary mt-3">Confirmar</button>
                    </form>
                </div>
            </div>
        </div>
    </div>
        
    </header>

    <!--CARROUSEL DE IMAGENESS-->

    <div class="contenedor-carrousel">

        <div class="atras botones">
            &#60
        </div>
        <div class="adelante botones">
            &#62
        </div>

        <img class="imagen-carrousel" src="imagenes/portada2.jpg">

    </div>


    <!--SECCION PRINCIPAL-->

    <main class="container-fluid">

        <div id="bienvenido" class="h2 shadow-lg p-3 mb-5 bg-body rounded"></div>

        <h3 class="container shadow-lg p-3 mb-5 bg-body rounded">ELIGE EL CONTENEDOR DE BASURA QUE CREAS MÁS CONVENIENTE
            PARA TIRAR MI PROYECTO E ILUSIONES</h3>

        <div class="container mb-5">
            <div class="row" id="contenedor-productos">
                <!--CONTENIDO GENERADO EN JAVASCRIPT-->
            </div>
        </div>

        <div class="container">
            <div>
                <table class="table table-stripped">
                    <thead>
                        <tr id="carrito-compras">

                        </tr>
                    </thead>
                </table>
            </div>
        </div>
    </main>

    <footer class="footer container">
        <div class="d-flex">

            <img src="imagenes/logosulo.png" alt="logosulo">


            <img src="imagenes/trominklogo.png" alt="trominklogo">


            <img src="imagenes/logojorgensen.png" alt="logojorgensen">

        </div>
        <div class="container d-flex flex-row-reverse">
            <img class="logo" src="imagenes/logo.png" alt="logo">
            <p>RONTIL S.A. 2022</p>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-ka7Sk0Gln4gmtz2MlQnikT1wXgYsOg+OMhuP+IlRH9sENBO0LRn5q+8nbTov4+1p"
        crossorigin="anonymous"></script>
    <script src="javascript/productos.js"></script>
    <script src="javascript/main.js"></script>
</body>

</html>
